<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Links</title>
</head>
<body>

  <h2>Archives</h2>

  <ul id="archive-list"></ul>

  <script>
    // URL to your JSON file on GitHub via jsDelivr
    const jsonURL =
      "https://cdn.jsdelivr.net/gh/c2vautomation/cv2automation@main/rawMinutes.json";

    const monthOrder = {
      January: 0,
      February: 1,
      March: 2,
      April: 3,
      May: 4,
      June: 5,
      July: 6,
      August: 7,
      September: 8,
      October: 9,
      November: 10,
      December: 11
    };

    async function loadArchives() {
      try {
        const response = await fetch(jsonURL);

        if (!response.ok) {
          throw new Error("Failed to fetch JSON file");
        }

        const archiveData = await response.json();

        // Sort newest first
        archiveData.sort((a, b) => {
          if (b.Year !== a.Year) {
            return b.Year - a.Year;
          }

          return monthOrder[b.Month] - monthOrder[a.Month];
        });

        const archiveList = document.getElementById("archive-list");

        archiveData.forEach(item => {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.href = item.Link;
          link.textContent = `${item.Month} ${item.Year}`;
          link.target = "_blank";

          li.appendChild(link);
          archiveList.appendChild(li);
        });

      } catch (error) {
        console.error(error);

        document.getElementById("archive-list").innerHTML =
          "<li>Failed to load archive data.</li>";
      }
    }

    loadArchives();
  </script>

</body>
</html>
